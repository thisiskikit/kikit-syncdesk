services:
  - type: web
    name: kikit-price-change-api
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci && npm run build:server
    startCommand: npm run start:once
    healthCheckPath: /api/health
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 20
    buildFilter:
      paths:
        - server/**
        - shared/**
        - script/build-server.ts
        - package.json
        - package-lock.json
        - tsconfig.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: SERVE_CLIENT_STATIC
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: MASTER_SKU_DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: LOG_DIR
        value: /var/data/logs
      - key: OPERATION_LOG_FILE
        value: /var/data/operation-logs.json
      - key: UI_STATE_FILE
        value: /var/data/ui-state.json
      - key: CHANNEL_SETTINGS_FILE
        value: /var/data/channel-settings.json
      - key: COUPANG_SETTINGS_FILE
        value: /var/data/coupang-settings.json
      - key: COUPANG_PRODUCT_CACHE_FILE
        value: /var/data/coupang-product-cache.json
      - key: NAVER_PRODUCT_CACHE_FILE
        value: /var/data/naver-product-cache.json
      - key: NAVER_PRODUCT_SELLER_BARCODE_CACHE_FILE
        value: /var/data/naver-product-seller-barcode-cache.json
      - key: NAVER_PRODUCT_MEMO_FILE
        value: /var/data/naver-product-memos.json
      - key: COUPANG_SHIPMENT_WORKSHEET_FILE
        value: /var/data/coupang-shipment-worksheet.json
      - key: COUPANG_BULK_PRICE_FILE
        value: /var/data/coupang-bulk-price.json
      - key: NAVER_BULK_PRICE_FILE
        value: /var/data/naver-bulk-price.json

  - type: web
    name: kikit-price-change-web
    runtime: static
    buildCommand: npm ci && npm run build:client
    staticPublishPath: ./dist/public
    buildFilter:
      paths:
        - client/**
        - shared/**
        - package.json
        - package-lock.json
        - tsconfig.json
        - vite.config.ts
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

